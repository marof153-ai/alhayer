{% load static %}
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}الهير الشرقية{% endblock %}</title>
    <style>
        :root {
            --primary: #76b82a;
            --accent: #e30613;
            --dark: #1a4a3a;
            --glass: rgba(255, 255, 255, 0.98);
            --shadow: 0 10px 30px rgba(0,0,0,0.08);
        }

        * { box-sizing: border-box; scroll-behavior: smooth; transition: all 0.3s ease; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0; background: #fdfdfd;
            color: var(--dark); text-align: center; overflow-x: hidden;
        }

        /* القائمة العلوية */
        .main-nav {
            position: fixed; top: 0; left: 0; width: 100%;
            background: var(--glass); backdrop-filter: blur(15px);
            z-index: 9999; border-bottom: 1px solid rgba(0,0,0,0.05);
            padding: 10px 0;
            box-shadow: var(--shadow);
        }

        .nav-container {
            max-width: 1200px; margin: 0 auto;
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 5%;
        }

        .logo img { height: clamp(45px, 8vw, 65px); width: auto; }

        /* الأزرار في الشاشات الكبيرة */
        .nav-button-group {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .nav-btn {
            text-decoration: none; color: white !important;
            background: linear-gradient(45deg, var(--primary), var(--dark));
            padding: 10px 18px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 0.9rem;
            white-space: nowrap;
        }

        .nav-btn:hover { transform: translateY(-2px); filter: brightness(1.1); }
        .btn-contact { background: var(--accent) !important; }

        /* زر القائمة للجوال (مخفي افتراضياً) */
        .menu-toggle {
            display: none;
            flex-direction: column;
            gap: 5px;
            cursor: pointer;
            padding: 10px;
        }

        .menu-toggle span {
            width: 25px; height: 3px; background: var(--dark); border-radius: 5px;
        }

        footer { padding: 40px 0; background: var(--dark); color: white; margin-top: 60px; font-size: 0.9rem; }

        /* 📱 تنسيقات الجوال والتابلت */
        @media (max-width: 992px) {
            .menu-toggle { display: flex; }

            .nav-button-group {
                position: absolute;
                top: 100%; left: 0; width: 100%;
                background: white;
                flex-direction: column;
                padding: 20px;
                gap: 15px;
                box-shadow: 0 15px 30px rgba(0,0,0,0.1);
                display: none; /* مخفي حتى يتم الضغط على الزر */
            }

            .nav-button-group.active {
                display: flex;
            }

            .nav-btn {
                width: 100%; /* الأزرار تأخذ العرض كامل في الجوال */
                text-align: center;
                padding: 15px;
                font-size: 1.1rem;
            }
        }

        {% block extra_css %}{% endblock %}
    </style>
</head>
<body>
    <nav class="main-nav">
        <div class="nav-container">
            <div class="logo">
                <a href="{% url 'home' %}">
                    <img src="{% static 'images/logo1.png' %}" alt="الهير الشرقية">
                </a>
            </div>

            <!-- زر القائمة للجوال -->
            <div class="menu-toggle" id="mobile-menu">
                <span></span>
                <span></span>
                <span></span>
            </div>

            <div class="nav-button-group" id="nav-links">
                <a href="{% url 'home' %}" class="nav-btn">الرئيسية</a>
                <a href="/#about" class="nav-btn">من نحن</a>
                <a href="/#projects" class="nav-btn">مشاريعنا</a>
                <a href="{% url 'services_page' %}" class="nav-btn">خدماتنا</a>
                <a href="/#news" class="nav-btn">الأخبار</a>
                <a href="/#contact" class="nav-btn btn">اتصل بنا</a>
            </div>
        </div>
    </nav>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer>
        <p>جميع الحقوق محفوظة &copy; 2026 لشركة الهير الشرقية</p>
    </footer>

    <!-- سكربت بسيط لتشغيل قائمة الجوال -->
    <script>
        const mobileMenu = document.getElementById('mobile-menu');
        const navLinks = document.getElementById('nav-links');

        mobileMenu.addEventListener('click', () => {
            navLinks.classList.toggle('active');
        });

        // إغلاق القائمة عند الضغط على أي رابط
        document.querySelectorAll('.nav-btn').forEach(link => {
            link.addEventListener('click', () => {
                navLinks.classList.remove('active');
            });
        });
    </script>
</body>
</html>
