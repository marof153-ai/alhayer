{% load static %}
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}الهير الشرقية{% endblock %}</title>

    <!-- خط القاهرة الفخم -->
    <link href="https://googleapis.com" rel="stylesheet">

    <style>
        :root {
            --primary-dark: #1a4a3a;
            --accent-green: #76b82a;
            --pure-white: #ffffff;
        }

        * { box-sizing: border-box; scroll-behavior: smooth; transition: 0.3s; }

        body {
            font-family: 'Cairo', sans-serif;
            margin: 0; background: var(--pure-white); color: var(--primary-dark);
            overflow-x: hidden;
        }

        .main-nav {
            position: fixed; top: 0; width: 100%; z-index: 10000;
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(10px);
            border-bottom: 2px solid #f0f0f0;
            height: 95px;
            display: flex; align-items: center;
        }

        .nav-container {
            max-width: 1400px; margin: 0 auto; width: 100%;
            display: flex; justify-content: space-between; align-items: center; padding: 0 4%;
        }

        .logo-wrap img {
            height: 80px;
            width: auto;
            display: block;
        }

        .nav-links { display: flex; gap: 15px; align-items: center; }

        .nav-link {
            text-decoration: none;
            color: var(--primary-dark) !important;
            padding: 10px 15px;
            font-weight: 700;
            font-size: 1.1rem;
        }

        .nav-link:hover { color: var(--accent-green) !important; }

        .btn-highlight {
            background: var(--accent-green);
            color: white !important;
            padding: 12px 25px !important;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(118, 184, 42, 0.2);
        }

        .menu-toggle { display: none; cursor: pointer; z-index: 10001; }
        .menu-toggle span { width: 30px; height: 3px; background: var(--primary-dark); margin: 5px; display: block; transition: 0.3s; }

        /* 📱 تعديلات الهاتف لتعمل القائمة بكفاءة */
        @media (max-width: 992px) {
            .menu-toggle { display: flex; flex-direction: column; }

            .nav-links {
                position: fixed;
                top: 80px; /* تحت الشريط مباشرة */
                right: -100%; /* مخفية خارج الشاشة */
                flex-direction: column;
                background: white;
                width: 100%;
                height: auto;
                padding: 20px 0;
                box-shadow: 0 10px 20px rgba(0,0,0,0.1);
                transition: 0.4s ease-in-out;
                gap: 0;
            }

            .nav-links.active {
                right: 0; /* تظهر عند الضغط */
            }

            .nav-link {
                width: 100%;
                text-align: center;
                padding: 15px;
                border-bottom: 1px solid #f5f5f5;
            }

            .btn-highlight {
                margin: 15px auto;
                width: 80%;
            }

            .main-nav { height: 80px; }
            .logo-wrap img { height: 60px; }
        }

        {% block extra_css %}{% endblock %}
    </style>
</head>
<body>
    <nav class="main-nav">
        <div class="nav-container">
            <div class="logo-wrap">
                <a href="{% url 'home' %}">
                    <img src="{% static 'images/logo1.png' %}" alt="الهير الشرقية">
                </a>
            </div>

            <div class="menu-toggle" id="mobile-menu">
                <span></span><span></span><span></span>
            </div>

            <div class="nav-links" id="nav-links">
                <a href="{% url 'home' %}" class="nav-link">الرئيسية</a>
                <a href="/#about" class="nav-link">من نحن</a>
                <a href="{% url 'services_page' %}" class="nav-link">خدماتنا</a>
                <a href="/#news" class="nav-link">الأخبار</a>
                <a href="/#contact" class="nav-link btn-highlight">اتصل بنا</a>
            </div>
        </div>
    </nav>

    <main style="padding-top: 95px;">
        {% block content %}{% endblock %}
    </main>

    <!-- إضافة السكربت اللازم لتشغيل قائمة الجوال -->
    <script>
        const mobileMenu = document.getElementById('mobile-menu');
        const navLinks = document.getElementById('nav-links');

        mobileMenu.addEventListener('click', () => {
            navLinks.classList.toggle('active');
        });
    </script>
</body>
</html>
