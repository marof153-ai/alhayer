{% load static %}
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>{% block title %}الهير الشرقية{% endblock %}</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root { --p-dark: #1a4a3a; --p-light: #76b82a; --white: #ffffff; }
        * { box-sizing: border-box; margin: 0; padding: 0; transition: 0.3s ease; }
        body { font-family: 'Cairo', sans-serif; background: var(--white); overflow-x: hidden; }

        /* 🟢 القائمة العلوية: بيضاء نقية مع لوجو يمين */
        .main-nav {
            position: fixed; top: 0; width: 100%; z-index: 10000;
            background: var(--white); height: 90px;
            display: flex; align-items: center; box-shadow: 0 2px 15px rgba(0,0,0,0.05);
            border-bottom: 2px solid var(--p-light);
        }
        .nav-container {
            max-width: 1400px; margin: 0 auto; width: 100%;
            display: flex; justify-content: space-between; align-items: center; padding: 0 4%;
        }
        .logo-wrap img { height: 75px; width: auto; }

        /* الأزرار الكبسولة */
        .nav-links { display: flex; gap: 8px; align-items: center; }
        .nav-btn {
            text-decoration: none; color: white !important; background: var(--p-dark);
            padding: 8px 22px; border-radius: 12px; font-weight: 600; font-size: 0.95rem;
        }
        .nav-btn:hover { background: var(--p-light); transform: translateY(-2px); }
        .btn-highlight { background: var(--p-light); }

        /* زر الجوال */
        .menu-toggle { display: none; cursor: pointer; flex-direction: column; gap: 5px; }
        .menu-toggle span { width: 28px; height: 3px; background: var(--p-dark); border-radius: 2px; }

        /* 📱 تنسيق الجوال */
        @media (max-width: 992px) {
            .menu-toggle { display: flex; }
            .nav-links {
                position: fixed; top: 90px; right: -100%; width: 100%;
                background: white; flex-direction: column; padding: 20px;
                gap: 10px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); display: flex;
            }
            .nav-links.active { right: 0; }
            .nav-btn { width: 100%; text-align: center; padding: 15px; }
        }

        /* واتساب عائم */
        .whatsapp-btn {
            position: fixed; bottom: 25px; left: 25px; z-index: 9999;
            background: #25d366; width: 60px; height: 60px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    <nav class="main-nav">
        <div class="nav-container">
            <div class="logo-wrap">
                <a href="{% url 'home' %}"><img src="{% static 'images/logo1.png' %}" alt="الهير الشرقية"></a>
            </div>
            <div class="menu-toggle" id="mobile-menu"><span></span><span></span><span></span></div>
            <div class="nav-links" id="nav-links">
                <a href="{% url 'home' %}" class="nav-btn">الرئيسية</a>
                <a href="/#about" class="nav-btn">من نحن</a>
                <a href="{% url 'services_page' %}" class="nav-btn">خدماتنا</a>
                <a href="/#news" class="nav-btn">الأخبار</a>
                <a href="/#contact" class="nav-btn btn-highlight">اتصل بنا</a>
            </div>
        </div>
    </nav>

    <main style="padding-top: 90px;">
        {% block content %}{% endblock %}
    </main>

    <a href="https://wa.me" class="whatsapp-btn" target="_blank">
        <svg viewBox="0 0 448 512" width="30" height="30" fill="white"><path d="M380.9 97.1C339 55.1 283.2 32 223.9 32c-122.4 0-222 99.6-222 222 0 39.1 10.2 77.3 29.6 111L0 480l117.7-30.9c32.4 17.7 68.9 27 106.1 27h.1c122.3 0 224.1-99.6 224.1-222 0-59.3-25.2-115-67.1-157zm-157 341.6c-33.1 0-65.6-8.9-94-25.7l-6.7-4-69.8 18.3L72 359.2l-4.4-7c-18.5-29.4-28.2-63.3-28.2-98.2 0-101.7 82.8-184.5 184.6-184.5 49.3 0 95.6 19.2 130.4 54.1 34.8 34.9 56.2 81.2 56.1 130.5 0 101.8-84.9 184.6-186.6 184.6zm101.2-138.2c-5.5-2.8-32.8-16.2-37.9-18-5.1-1.9-8.8-2.8-12.5 2.8-3.7 5.6-14.3 18-17.6 21.8-3.2 3.7-6.5 4.2-12 1.4-5.5-2.8-23.2-8.5-44.2-27.1-16.4-14.6-27.4-32.7-30.6-38.2-3.2-5.6-.3-8.6 2.5-11.3 2.5-2.5 5.5-6.5 8.3-9.7 2.8-3.3 3.7-5.6 5.5-9.3 1.8-3.7.9-6.9-.5-9.7-1.4-2.8-12.5-30.1-17.1-41.2-4.5-10.8-9.1-9.3-12.5-9.5-3.2-.2-6.9-.2-10.6-.2-3.7 0-9.7 1.4-14.8 6.9-5.1 5.6-19.4 19-19.4 46.3 0 27.3 19.9 53.7 22.6 57.4 2.8 3.7 39.1 59.7 94.8 83.8 13.2 5.8 23.5 9.2 31.5 11.8 13.3 4.2 25.4 3.6 34.9 2.2 10.6-1.6 32.8-13.4 37.4-26.4 4.6-13 4.6-24.1 3.2-26.4-1.3-2.5-5-3.9-10.5-6.6z"/></svg>
    </a>

    <script>
        const mobileMenu = document.getElementById('mobile-menu');
        const navLinks = document.getElementById('nav-links');

        mobileMenu.addEventListener('click', (e) => {
            navLinks.classList.toggle('active');
            e.stopPropagation();
        });

        // إغلاق القائمة تلقائياً عند الضغط على أي رابط
        document.querySelectorAll('.nav-btn').forEach(link => {
            link.addEventListener('click', () => {
                navLinks.classList.remove('active');
            });
        });

        document.addEventListener('click', (e) => {
            if (!navLinks.contains(e.target) && !mobileMenu.contains(e.target)) {
                navLinks.classList.remove('active');
            }
        });
    </script>
</body>
</html>
